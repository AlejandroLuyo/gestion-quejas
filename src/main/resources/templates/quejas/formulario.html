<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva Queja</title>
</head>
<body>
<h1>Registrar Nueva Queja</h1>
<form action="/quejas/guardar" method="post">
    <label>Nombre del Cliente:</label><br/>
    <input type="text" name="nombreCliente"/><br/><br/>

    <label>Contact Reason:</label><br/>
    <select name="contactReason">
        <option value="ESTADO_TRAMITE">Estado del Trámite</option>
        <option value="ERROR_DOCUMENTAL">Error Documental</option>
        <option value="REEMBOLSO">Reembolso</option>
        <option value="TIEMPO_RESPUESTA">Tiempo de Respuesta</option>
    </select><br/><br/>

    <label>Descripción:</label><br/>
    <textarea name="descripcion" rows="4" cols="40"></textarea><br/><br/>

    <button type="submit">Guardar Queja</button>
</form>
<br/>
<a href="/quejas">Volver a la lista</a>
</body>
</html>
