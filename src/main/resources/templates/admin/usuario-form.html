<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CSManager - Nuevo usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/usuario-form.css}" rel="stylesheet">
</head>
<body>

<!-- ICON RAIL -->
<div class="icon-rail">
    <div class="rail-logo" onclick="toggleSidebar()">
        <i class="ti ti-headset"></i>
    </div>
    <a href="/quejas" class="rail-btn" title="Quejas">
        <i class="ti ti-inbox"></i>
    </a>
    <a href="/estadisticas" class="rail-btn" title="Estadísticas">
        <i class="ti ti-chart-bar"></i>
    </a>
    <a href="/admin/usuarios" class="rail-btn active" title="Usuarios">
        <i class="ti ti-users"></i>
    </a>
    <div class="rail-bottom">
        <div class="rail-btn" onclick="toggleDark()" title="Modo oscuro">
            <i class="ti ti-moon" id="dark-icon"></i>
        </div>
        <div class="avatar-small">AJ</div>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <span>CSManager</span>
    </div>
    <div class="sidebar-menu">
        <div class="menu-section">Administración</div>
        <a href="/admin/usuarios" class="menu-item active">
            <i class="ti ti-users"></i> Usuarios
        </a>
        <div class="menu-section">Navegación</div>
        <a href="/quejas" class="menu-item">
            <i class="ti ti-layout-dashboard"></i> Vista general
        </a>
        <a href="/estadisticas" class="menu-item">
            <i class="ti ti-chart-bar"></i> Estadísticas
        </a>
    </div>
    <div class="sidebar-agent">
        <div class="sidebar-avatar">AJ</div>
        <div>
            <div class="sidebar-agent-name">Alejandro</div>
            <div class="sidebar-agent-role">Administrador</div>
        </div>
    </div>
</div>

<!-- MAIN WRAPPER -->
<div class="main-wrapper" id="main-wrapper">
    <div class="topbar">
        <span class="topbar-title">Nuevo usuario</span>
        <div class="topbar-right">
            <a href="/admin/usuarios" class="btn btn-sm"
               style="border:1px solid #e2e8f0; color:#64748b; font-size:13px; text-decoration:none; padding:8px 16px; border-radius:8px;">
                <i class="ti ti-arrow-left"></i> Volver
            </a>
        </div>
    </div>

    <div class="content-area">
        <div class="form-card">
            <form th:action="@{/admin/usuarios/guardar}" method="post">
                <div class="form-group">
                    <label>Nombre completo</label>
                    <input type="text" name="nombre" placeholder="Ej: María García" required/>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="maria@csmanager.com" required/>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" placeholder="••••••••" required/>
                </div>
                <div class="form-group">
                    <label>Rol</label>
                    <select name="rol" required>
                        <option value="">Seleccionar rol...</option>
                        <option value="AGENTE">Agente</option>
                        <option value="SUPERVISOR">Supervisor</option>
                        <option value="ADMINISTRADOR">Administrador</option>
                    </select>
                </div>
                <div class="form-actions">
                    <a href="/admin/usuarios" class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-guardar">
                        <i class="ti ti-check"></i> Guardar usuario
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
