spring.application.name=gestion-quejas

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=gestion_quejas;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Admin123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

ia.api.key=${GROQ_API_KEY}
ia.api.model=llama-3.3-70b-versatile
ia.api.url=https://api.groq.com/openai/v1/chat/completions

# gemini.api.key=${GEMINI_API_KEY}
# gemini.api.model=gemini-2.5-flash

app.base-url=http://localhost:8080

# Configuración de correo (Gmail SMTP + IMAP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# IMAP para lectura de correos entrantes
email.imap.host=imap.gmail.com
email.imap.port=993
email.imap.username=${EMAIL_USERNAME}
email.imap.password=${EMAIL_APP_PASSWORD}