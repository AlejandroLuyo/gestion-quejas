<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>CSManager - Configuración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/configuracion.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navegacion :: navegacion('configuracion', null)}"></div>

<div class="main-wrapper" id="main-wrapper">
    <div class="topbar">
        <span class="topbar-title">Configuración</span>
        <div class="topbar-right">
            <button onclick="toggleDark()" id="dark-btn" class="theme-toggle-btn" type="button">
                <i class="ti ti-moon" id="dark-icon-btn"></i>
                <span id="dark-text-btn">Modo oscuro</span>
            </button>
        </div>
    </div>

    <div class="content-area">
        <div class="config-layout">

            <!-- SECCIÓN: Cuenta -->
            <div class="config-card">
                <div class="config-card-header">
                    <i class="ti ti-user-circle"></i>
                    <span>Configuración de la cuenta</span>
                </div>
                <div class="config-card-body">

                    <div class="config-field">
                        <label class="config-label">Nombre</label>
                        <input class="config-input config-input-disabled"
                               th:value="${usuario.nombre}" disabled />
                        <p class="config-hint">El nombre no puede modificarse.</p>
                    </div>

                    <div class="config-field">
                        <label class="config-label">Email</label>
                        <input class="config-input" id="cfgEmail" type="email"
                               th:value="${usuario.email}" />
                    </div>

                    <div class="config-field">
                        <label class="config-label">Firma de correo (opcional)</label>
                        <textarea class="config-input" id="cfgFirma" rows="4"
                                  placeholder="Nombre / Cargo / Contacto / Empresa"
                                  th:text="${usuario.firma}"></textarea>
                        <p class="config-hint">Se agregará automáticamente al final de tus respuestas por correo.</p>
                    </div>

                    <div class="config-field">
                        <label class="config-label">Idioma</label>
                        <select class="config-select" id="cfgIdioma">
                            <option value="es" th:selected="${usuario.idioma == 'es'}">Español</option>
                            <option value="en" th:selected="${usuario.idioma == 'en'}">English</option>
                        </select>
                    </div>

                    <div class="config-field">
                        <label class="config-label">Zona horaria</label>
                        <select class="config-select" id="cfgZona">
                            <option value="America/Lima"       th:selected="${usuario.zonaHoraria == 'America/Lima'}">GMT-5 (Bogotá, Lima, Quito)</option>
                            <option value="America/Bogota"     th:selected="${usuario.zonaHoraria == 'America/Bogota'}">GMT-5 (Colombia)</option>
                            <option value="America/Mexico_City"th:selected="${usuario.zonaHoraria == 'America/Mexico_City'}">GMT-6 (Ciudad de México)</option>
                            <option value="America/Santiago"   th:selected="${usuario.zonaHoraria == 'America/Santiago'}">GMT-4 (Santiago)</option>
                            <option value="America/Argentina/Buenos_Aires" th:selected="${usuario.zonaHoraria == 'America/Argentina/Buenos_Aires'}">GMT-3 (Buenos Aires)</option>
                            <option value="Europe/Madrid"      th:selected="${usuario.zonaHoraria == 'Europe/Madrid'}">GMT+2 (Madrid)</option>
                            <option value="UTC"                th:selected="${usuario.zonaHoraria == 'UTC'}">UTC</option>
                        </select>
                    </div>

                </div>
            </div>

            <!-- SECCIÓN: Seguridad -->
            <div class="config-card">
                <div class="config-card-header">
                    <i class="ti ti-lock"></i>
                    <span>Seguridad</span>
                </div>
                <div class="config-card-body">

                    <div class="config-field">
                        <label class="config-label">Nueva contraseña</label>
                        <input class="config-input" id="cfgPassword" type="password"
                               placeholder="Dejar en blanco para no cambiar" />
                        <p class="config-hint">Mínimo 6 caracteres.</p>
                    </div>

                    <div class="config-field">
                        <label class="config-label">Confirmar contraseña</label>
                        <input class="config-input" id="cfgPasswordConfirm" type="password"
                               placeholder="Repetir nueva contraseña" />
                    </div>

                </div>
            </div>

            <!-- SECCIÓN: Funcionalidades (solo ADMINISTRADOR) -->
            <div class="config-card" sec:authorize="hasRole('ADMINISTRADOR')">
                <div class="config-card-header">
                    <i class="ti ti-toggle-right"></i>
                    <span>Funcionalidades del sistema</span>
                </div>
                <div class="config-card-body">

                    <div class="config-field config-toggle-row" th:each="flag : ${flags}">
                        <div th:switch="${flag.keyName}">
                            <p class="config-toggle-label" th:case="'modulo_pruebas'">Módulo de Pruebas</p>
                            <p class="config-toggle-label" th:case="*" th:text="${flag.keyName}"></p>

                            <p class="config-hint" th:text="${flag.description}"></p>
                        </div>
                        <label class="config-toggle">
                            <input type="checkbox"
                                   class="flag-toggle-input"
                                   th:attr="data-flag-key=${flag.keyName}"
                                   th:checked="${flag.enabled}" />
                            <span class="config-toggle-slider"></span>
                        </label>
                    </div>

                </div>
            </div>

            <!-- ERROR / ÉXITO -->
            <div id="cfgError" class="config-alert config-alert-error" style="display:none;"></div>
            <div id="cfgExito" class="config-alert config-alert-exito" style="display:none;"></div>

            <!-- ACCIONES -->
            <div class="config-actions">
                <button class="config-btn-guardar" id="btnGuardarConfig" onclick="guardarConfiguracion()">
                    <i class="ti ti-device-floppy"></i> Guardar cambios
                </button>
            </div>

        </div>
    </div>
</div>

<script th:src="@{/js/dashboard.js}"></script>
<script th:src="@{/js/configuracion.js}"></script>
</body>
</html>
