<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CSManager - Comprar visa (prueba)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/usuario-form.css}" rel="stylesheet">
    <link th:href="@{/css/comprar-visa.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navegacion :: navegacion('comprar-visa', null)}"></div>

<div class="main-wrapper" id="main-wrapper">
    <div class="topbar">
        <span class="topbar-title">Comprar visa (prueba)</span>
        <div class="topbar-right">
            <a href="/quejas" class="btn btn-sm" style="border:1px solid #e2e8f0; color:#64748b; font-size:13px; text-decoration:none; padding:8px 16px; border-radius:8px;">
                <i class="ti ti-arrow-left"></i> Volver
            </a>
        </div>
    </div>

    <div class="content-area">

        <div th:if="${ordenGenerada}" style="background:#dcfce7; color:#166634; padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:13px;">
            <i class="ti ti-check"></i> Orden generada correctamente. Número de orden: <strong th:text="${ordenGenerada}"></strong>
            (guárdalo, lo necesitarás para registrar una queja en Portal Cliente).
        </div>

        <div class="wizard-progress">
            <div class="wizard-step-indicator active" data-step="1">
                <div class="step-circle">1</div>
                <div class="step-label">Selección de visa</div>
            </div>
            <div class="wizard-line"></div>
            <div class="wizard-step-indicator" data-step="2">
                <div class="step-circle">2</div>
                <div class="step-label">Datos del viajero</div>
            </div>
            <div class="wizard-line"></div>
            <div class="wizard-step-indicator" data-step="3">
                <div class="step-circle">3</div>
                <div class="step-label">Procesamiento y pago</div>
            </div>
        </div>

        <div class="form-card">
            <form th:action="@{/admin/comprar-visa}" method="post" id="form-comprar-visa">

                <div class="wizard-part active" data-part="1">
                    <h3>Selección de visa</h3>
                    <div class="form-group">
                        <label>Producto</label>
                        <select name="productoId" required>
                            <option value="">Seleccionar producto...</option>
                            <option th:each="p : ${productos}" th:value="${p.productoId}" th:text="${p.productName}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Pasaporte (nacionalidad)</label>
                        <select name="userNationality" required>
                            <option value="">Seleccionar país...</option>
                            <option value="Perú">Perú</option>
                            <option value="Estados Unidos">Estados Unidos</option>
                            <option value="Reino Unido">Reino Unido</option>
                            <option value="Canadá">Canadá</option>
                            <option value="México">México</option>
                            <option value="Colombia">Colombia</option>
                            <option value="Chile">Chile</option>
                            <option value="Argentina">Argentina</option>
                            <option value="Brasil">Brasil</option>
                            <option value="España">España</option>
                            <option value="Francia">Francia</option>
                            <option value="Alemania">Alemania</option>
                            <option value="Italia">Italia</option>
                            <option value="Australia">Australia</option>
                            <option value="India">India</option>
                            <option value="China">China</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Destino</label>
                        <select name="destinationCountry" required>
                            <option value="">Seleccionar país...</option>
                            <option value="Perú">Perú</option>
                            <option value="Estados Unidos">Estados Unidos</option>
                            <option value="Reino Unido">Reino Unido</option>
                            <option value="Canadá">Canadá</option>
                            <option value="México">México</option>
                            <option value="Colombia">Colombia</option>
                            <option value="Chile">Chile</option>
                            <option value="Argentina">Argentina</option>
                            <option value="Brasil">Brasil</option>
                            <option value="España">España</option>
                            <option value="Francia">Francia</option>
                            <option value="Alemania">Alemania</option>
                            <option value="Italia">Italia</option>
                            <option value="Australia">Australia</option>
                            <option value="India">India</option>
                            <option value="China">China</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <span></span>
                        <button type="button" class="btn-guardar" onclick="siguientePaso(1)">Siguiente <i class="ti ti-arrow-right"></i></button>
                    </div>
                </div>

                <div class="wizard-part" data-part="2">
                    <h3>Datos del viajero</h3>
                    <div class="form-group">
                        <label>Nombre completo</label>
                        <input type="text" name="nombreCliente" placeholder="Ej: Carlos Mendoza" required/>
                    </div>
                    <div class="form-group">
                        <label>Correo electrónico</label>
                        <input type="email" name="emailCliente" placeholder="Ej: carlos@email.com" required/>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-cancelar" onclick="pasoAnterior(2)"><i class="ti ti-arrow-left"></i> Atrás</button>
                        <button type="button" class="btn-guardar" onclick="siguientePaso(2)">Siguiente <i class="ti ti-arrow-right"></i></button>
                    </div>
                </div>

                <div class="wizard-part" data-part="3">
                    <h3>Procesamiento y pago</h3>
                    <div class="form-group">
                        <label>Velocidad de procesamiento</label>
                        <div class="processing-options">
                            <label class="processing-option">
                                <input type="radio" name="processingSpeed" value="standard" checked onchange="actualizarResumen()"/>
                                <div class="processing-option-content">
                                    <div class="processing-option-title">Standard</div>
                                    <div class="processing-option-sub">Entrega en 24 horas</div>
                                </div>
                                <div class="processing-option-price">S/ 80.00</div>
                            </label>
                            <label class="processing-option">
                                <input type="radio" name="processingSpeed" value="rush" onchange="actualizarResumen()"/>
                                <div class="processing-option-content">
                                    <div class="processing-option-title">Rush</div>
                                    <div class="processing-option-sub">Entrega en 4 horas</div>
                                </div>
                                <div class="processing-option-price">S/ 120.00</div>
                            </label>
                            <label class="processing-option">
                                <input type="radio" name="processingSpeed" value="super_rush" onchange="actualizarResumen()"/>
                                <div class="processing-option-content">
                                    <div class="processing-option-title">Super Rush <i class="ti ti-bolt"></i></div>
                                    <div class="processing-option-sub">Entrega en 15 minutos</div>
                                </div>
                                <div class="processing-option-price">S/ 150.00</div>
                            </label>
                        </div>
                    </div>
                    <div class="resumen-total">
                        <span>Total</span>
                        <span id="resumen-precio">S/ 80.00</span>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-cancelar" onclick="pasoAnterior(3)"><i class="ti ti-arrow-left"></i> Atrás</button>
                        <button type="submit" class="btn-guardar">
                            <i class="ti ti-shopping-cart"></i> Comprar visa
                        </button>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/dashboard.js}"></script>
<script th:src="@{/js/comprar-visa.js}"></script>
</body>
</html>
