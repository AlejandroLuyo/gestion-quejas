# ============================================================
# Conexión a PostgreSQL
# En Railway: usa las variables PGHOST, PGPORT, etc. inyectadas
#             automáticamente por el servicio Postgres del proyecto.
# En local:   si esas variables no existen en tu entorno, cae
#             automáticamente en los valores por defecto de abajo
#             (tu configuración local actual), gracias a la sintaxis
#             ${VARIABLE:valor_por_defecto} de Spring.
# ============================================================
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:gestion_quejas_pg}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:Admin123!}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
