spring.profiles.active=postgres
spring.application.name=gestion-quejas
spring.jpa.show-sql=true

# ============================================================
# Puerto del servidor
# Railway asigna el puerto dinámicamente vía la variable PORT.
# En local, esa variable no existe, así que usa el 8080 de siempre.
# ============================================================
server.port=${PORT:8080}

ia.api.key=${GROQ_API_KEY}
ia.api.model=llama-3.3-70b-versatile
ia.api.url=https://api.groq.com/openai/v1/chat/completions

app.base-url=${APP_BASE_URL:http://localhost:8080}

# Configuración de correo (Gmail SMTP + IMAP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# IMAP para lectura de correos entrantes
email.imap.host=imap.gmail.com
email.imap.port=993
email.imap.username=${EMAIL_USERNAME}
email.imap.password=${EMAIL_APP_PASSWORD}
# Permite pausar el polling de correo entrante sin detener toda la app (para ahorrar consumo en Railway)
email.polling.enabled=${EMAIL_POLLING_ENABLED:true}