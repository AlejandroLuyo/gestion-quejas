<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<th:block th:fragment="navegacion(paginaActiva, vistaActiva)">

    <!-- SIDEBAR -->
    <div class="icon-rail sidebar-unificada" id="sidebar">

        <!-- Logo -->
        <div class="rail-logo sidebar-toggle" onclick="toggleSidebar()">
            <i class="ti ti-headset"></i>
            <span class="sidebar-brand">CSManager</span>
        </div>

        <!-- Menú -->
        <div class="sidebar-menu-unificada">

            <div class="menu-section">BANDEJA</div>

            <a href="/quejas"
               class="rail-btn menu-item-unificado"
               th:classappend="${paginaActiva == 'quejas'} ? 'active' : ''">
                <i class="ti ti-inbox"></i>
                <span>Quejas</span>
            </a>

            <a href="/estadisticas"
               class="rail-btn menu-item-unificado"
               sec:authorize="hasAnyRole('SUPERVISOR','ADMINISTRADOR')"
               th:classappend="${paginaActiva == 'estadisticas'} ? 'active' : ''">
                <i class="ti ti-chart-bar"></i>
                <span>Estadísticas</span>
            </a>

            <a href="/reembolso/lista"
               class="rail-btn menu-item-unificado"
               sec:authorize="hasAnyRole('SUPERVISOR','ADMINISTRADOR')"
               th:classappend="${paginaActiva == 'reembolsos'} ? 'active' : ''">
                <i class="ti ti-receipt-refund"></i>
                <span>Reembolsos</span>
            </a>

            <div class="menu-section"
                 sec:authorize="hasRole('ADMINISTRADOR')">
                ADMINISTRACIÓN
            </div>

            <a href="/admin/usuarios"
               class="rail-btn menu-item-unificado"
               sec:authorize="hasRole('ADMINISTRADOR')"
               th:classappend="${paginaActiva == 'usuarios'} ? 'active' : ''">
                <i class="ti ti-users"></i>
                <span>Usuarios</span>
            </a>

            <a href="/configuracion"
               class="rail-btn menu-item-unificado"
               th:classappend="${paginaActiva == 'configuracion'} ? 'active' : ''">
                <i class="ti ti-settings"></i>
                <span>Configuración</span>
            </a>

            <th:block sec:authorize="hasRole('ADMINISTRADOR')">
                <div class="menu-section"
                     th:if="${@featureFlagService.isEnabled('modulo_pruebas')}">
                    PRUEBAS
                </div>

                <a href="/admin/comprar-visa"
                   class="rail-btn menu-item-unificado"
                   th:if="${@featureFlagService.isEnabled('modulo_pruebas')}"
                   th:classappend="${paginaActiva == 'comprar-visa'} ? 'active' : ''">
                    <i class="ti ti-shopping-cart"></i>
                    <span>Comprar visa</span>
                </a>

                <a href="/admin/portal-cliente"
                   class="rail-btn menu-item-unificado"
                   th:if="${@featureFlagService.isEnabled('modulo_pruebas')}"
                   th:classappend="${paginaActiva == 'portal-cliente'} ? 'active' : ''">
                    <i class="ti ti-message-2"></i>
                    <span>Portal cliente</span>
                </a>
            </th:block>

        </div>

        <!-- Parte inferior -->
        <div class="sidebar-bottom-unificada">

            <div class="rail-btn menu-item-unificado"
                 onclick="toggleDark()">
                <i class="ti ti-moon" id="dark-icon"></i>
                <span>Modo</span>
            </div>

            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit"
                        class="sidebar-user-btn">

                    <div class="sidebar-avatar"
                         th:text="${#authentication.principal.username.substring(0,2).toUpperCase()}">
                        AJ
                    </div>

                    <div class="sidebar-user-info">
                        <div class="sidebar-agent-name"
                             th:text="${#authentication.principal.username}">
                            Usuario
                        </div>

                        <div class="sidebar-agent-role"
                             sec:authorize="hasRole('ADMINISTRADOR')">
                            Administrador
                        </div>

                        <div class="sidebar-agent-role"
                             sec:authorize="hasRole('SUPERVISOR')">
                            Supervisor
                        </div>

                        <div class="sidebar-agent-role"
                             sec:authorize="hasRole('AGENTE')">
                            Agente
                        </div>
                    </div>

                </button>
            </form>

        </div>

    </div>

    <!-- Datos del usuario actual expuestos al JS (usados para permisos en los modales) -->
    <script th:inline="javascript">
        const usuarioActualNombre = /*[[${#authentication.principal.username}]]*/ '';
    </script>
    <span id="rol-admin-flag" sec:authorize="hasRole('ADMINISTRADOR')" style="display:none;">1</span>
    <span id="rol-supervisor-flag" sec:authorize="hasRole('SUPERVISOR')" style="display:none;">1</span>
</th:block>

</body>
</html>
