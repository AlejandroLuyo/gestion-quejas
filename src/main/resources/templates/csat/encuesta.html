<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de satisfacción</title>
    <link th:href="@{/css/encuesta.css}" rel="stylesheet">
</head>
<body>
<div class="card">
    <div th:if="${yaRespondio}">
        <div class="logo">CS<span>Manager</span></div>
        <div class="ya-respondio">
            Ya has respondido esta encuesta anteriormente. ¡Gracias por tu tiempo!
        </div>
    </div>

    <div th:if="${!yaRespondio}" id="formulario">
        <div class="logo">CS<span>Manager</span></div>
        <div class="order-id" th:text="'Orden: ' + ${orderId}"></div>
        <div class="titulo">¿Cómo calificarías tu atención?</div>
        <div class="subtitulo">Tu opinión nos ayuda a mejorar el servicio</div>

        <div class="estrellas">
            <span class="estrella" onclick="seleccionar(1)">★</span>
            <span class="estrella" onclick="seleccionar(2)">★</span>
            <span class="estrella" onclick="seleccionar(3)">★</span>
            <span class="estrella" onclick="seleccionar(4)">★</span>
            <span class="estrella" onclick="seleccionar(5)">★</span>
        </div>
        <div class="labels">
            <span>Muy malo</span>
            <span>Excelente</span>
        </div>

        <textarea id="comentario" rows="3" placeholder="Comentario opcional..."></textarea>

        <button class="btn-enviar" id="btn-enviar" disabled onclick="enviar()">
            Enviar calificación
        </button>
    </div>

    <div class="gracias" id="gracias">
        <div class="icono">✅</div>
        <h2>¡Gracias por tu calificación!</h2>
        <p>Tu opinión ha sido registrada exitosamente.</p>
    </div>
</div>

<script th:inline="javascript">
    const token = [[${token}]];
</script>
<script th:src="@{/js/encuesta.js}"></script>
</body>
</html>
