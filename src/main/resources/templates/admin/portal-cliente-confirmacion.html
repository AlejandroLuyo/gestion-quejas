<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CSManager - Queja registrada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/usuario-form.css}" rel="stylesheet">
    <link th:href="@{/css/comprar-visa.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navegacion :: navegacion('portal-cliente', null)}"></div>

<div class="main-wrapper" id="main-wrapper">
    <div class="topbar">
        <span class="topbar-title">Portal Cliente (prueba)</span>
    </div>

    <div class="content-area">
        <div class="wizard-progress">
            <div class="wizard-step-indicator completed" data-step="1">
                <div class="step-circle"><i class="ti ti-check"></i></div>
                <div class="step-label">Datos</div>
            </div>
            <div class="wizard-line"></div>
            <div class="wizard-step-indicator completed" data-step="2">
                <div class="step-circle"><i class="ti ti-check"></i></div>
                <div class="step-label">Queja</div>
            </div>
            <div class="wizard-line"></div>
            <div class="wizard-step-indicator active" data-step="3">
                <div class="step-circle">3</div>
                <div class="step-label">Confirmación</div>
            </div>
        </div>

        <div class="form-card" style="text-align:center;">
            <div style="font-size:48px; color:#16a34a; margin-bottom:12px;"><i class="ti ti-circle-check"></i></div>
            <h3>Queja registrada</h3>
            <p style="font-size:13px; color:#64748b; margin-bottom:20px;">Tu queja fue registrada. El chatbot iVy comenzará a atenderla en breve.</p>

            <div style="text-align:left; max-width:360px; margin:0 auto;">
                <div class="resumen-total" style="margin-bottom:8px;">
                    <span>ID de conversación</span>
                    <span th:text="'#' + ${conversacion.conversacionId}"></span>
                </div>
                <div class="resumen-total" style="margin-bottom:8px; background:#fef3c7; color:#92400e;">
                    <span>Estado</span>
                    <span th:text="${conversacion.currentConversationState}"></span>
                </div>
                <div class="resumen-total" style="margin-bottom:8px; background:#dbeafe; color:#1d4ed8;">
                    <span>Agente asignado</span>
                    <span th:text="${conversacion.teammateCurrentlyAssigned} + ' (Bot IA)'"></span>
                </div>
            </div>

            <a href="/admin/portal-cliente" class="btn-guardar" style="display:inline-flex; margin-top:20px; text-decoration:none;">
                Nueva queja
            </a>
        </div>
    </div>
</div>

<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
